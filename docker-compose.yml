version: '3.8'

services:
  kanban:
    build: .
    container_name: popo-task-kanban
    ports:
      - "5151:5151"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - DATA_DIR=/app/data
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - CORS_ORIGINS=*
    restart: unless-stopped
